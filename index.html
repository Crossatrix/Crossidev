<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDocs – Developer Documentation</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            color: #fff;
        }

        .category-section {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
        }

        .category-header {
            cursor: pointer;
        }

        .category-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .category-desc {
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 10px;
        }

        /* Artikel-Liste innerhalb einer Kategorie */
        .article-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: none; /* Standardmäßig versteckt, bis Kategorie aktiv ist */
            border-left: 2px solid var(--border-color);
            padding-left: 10px;
        }

        .category-section.active .article-list {
            display: block;
        }

        .article-item {
            padding: 6px 0;
            font-size: 0.9rem;
            cursor: pointer;
            color: #8b949e;
            transition: color 0.2s;
        }

        .article-item:hover, .article-item.active {
            color: var(--accent-color);
        }

        /* Main Content Styling */
        #content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        #article-view {
            max-width: 800px;
            margin: 0 auto;
            white-space: pre-wrap;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .loading {
            color: var(--accent-color);
            font-style: italic;
        }

        .error {
            color: #f85149;
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">DevDocs //</div>
        <div id="categories-container"></div>
    </nav>

    <main id="content-area">
        <div id="article-view">Select an article from the sidebar to start reading.</div>
    </main>

    <script>
        const categoriesContainer = document.getElementById('categories-container');
        const articleView = document.getElementById('article-view');

        // Initialisierung
        async function init() {
            try {
                const response = await fetch('categories.json');
                if (!response.ok) throw new Error('Failed to fetch categories.json');
                const categories = await response.json();
                renderSidebar(categories);
            } catch (err) {
                articleView.innerHTML = `<span class="error">Error loading documentation structure: ${err.message}</span>`;
            }
        }

        // Sidebar mit Kategorien und deren Artikeln aufbauen
        function renderSidebar(categories) {
            categoriesContainer.innerHTML = '';
            
            categories.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                
                // Kategorie-Header HTML
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <div class="category-name">${cat.name}</div>
                    <div class="category-desc">${cat.description}</div>
                `;
                
                // Liste für die Artikel dieser Kategorie
                const ul = document.createElement('ul');
                ul.className = 'article-list';
                
                cat.articles.forEach(articleName => {
                    const li = document.createElement('li');
                    li.className = 'article-item';
                    li.textContent = articleName;
                    
                    li.addEventListener('click', (e) => {
                        e.stopPropagation(); // Verhindert, dass der Kategorie-Klick getriggert wird
                        
                        // Active-Klasse bei Artikeln verwalten
                        document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        
                        // Laden: articles/[ordner]/[datei].txt
                        loadArticle(cat.files, articleName);
                    });
                    
                    ul.appendChild(li);
                });
                
                // Kategorie-Klick öffnet/schließt die Artikel-Liste
                header.addEventListener('click', () => {
                    const isActive = section.classList.contains('active');
                    document.querySelectorAll('.category-section').forEach(el => el.classList.remove('active'));
                    if (!isActive) {
                        section.classList.add('active');
                    }
                });
                
                section.appendChild(header);
                section.appendChild(ul);
                categoriesContainer.appendChild(section);
            });
        }

        // Artikel-Inhalt laden
        async function loadArticle(folderName, fileName) {
            articleView.innerHTML = '<span class="loading">Loading article...</span>';
            try {
                // Pfad angepasst auf: articles/ordnerName/dateiName.txt
                const response = await fetch(`articles/${folderName}/${fileName}.txt`);
                if (!response.ok) throw new Error(`Article "${fileName}.txt" not found in "articles/${folderName}/".`);
                const text = await response.text();
                
                articleView.textContent = text; 
            } catch (err) {
                articleView.innerHTML = `<span class="error">Error loading article: ${err.message}</span>`;
            }
        }

        // Start
        init();
    </script>
</body>
</html>
